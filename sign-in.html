<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<title>Sign In — Omid Nik Mohammadi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Manrope:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles/style.css">
<link rel="stylesheet" href="./styles/sign-in-up.css">
</head>
<body>


<header class="site-header" id="siteHeader">
  <div class="header-inner">
    <a href="#top" class="brand">OMID</a>
    <div class="header-actions">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle light and dark theme">
        <span class="theme-toggle-dot"></span>
      </button>

      <button class="menu-toggle" id="menuToggle" aria-label="Open navigation menu" aria-expanded="false">
        <span class="menu-toggle-line"></span>
        <span class="menu-toggle-line"></span>
      </button>
    </div>
  </div>
</header>

<div class="side-nav" id="sideNav">
  <div class="side-nav-overlay" id="sideNavOverlay"></div>
  <nav class="side-nav-panel" aria-label="Primary">
    <div class="side-nav-top">
      <div class="side-nav-brand">
        <span class="side-nav-brand-name">Omid Nik Mohamadi</span>
        <span class="side-nav-brand-sub" lang="fa" dir="rtl"> امید نیک محمدی</span>
      </div>
      <button class="side-nav-close" id="sideNavClose" aria-label="Close navigation menu">&times;</button>
    </div>
    <ul class="side-nav-links">
      <li><a href="#top" class="side-nav-link" data-nav-link><span class="side-nav-link-index">01</span>Home</a></li>
      <li><a href="#craft" class="side-nav-link" data-nav-link><span class="side-nav-link-index">02</span>The Craft</a></li>
      <li><a href="#services" class="side-nav-link" data-nav-link><span class="side-nav-link-index">03</span>Services</a></li>
      <li><a href="#contact" class="side-nav-link" data-nav-link><span class="side-nav-link-index">04</span>Contact</a></li>
    </ul>
    <div class="side-nav-bottom">
      <a href="#contact" class="side-nav-book" data-nav-link>
        <span lang="fa" dir="rtl">رزرو نوبت</span>
        <span class="side-nav-book-en">Book an Appointment</span>
      </a>
      <a href="https://instagram.com/omidnikmohamadi" class="side-nav-social" target="_blank" rel="noopener">Instagram</a>
    </div>
  </nav>
</div>


<div class="auth" data-page="sign-in">



  <div class="auth__layout">

    <section class="auth__visual" aria-hidden="true">
      <img class="auth__visual-image" src="https://picsum.photos/seed/omid-barber-chair/1200/1600" alt="">

      <!--
      <video class="auth__visual-video" autoplay muted loop playsinline poster="https://picsum.photos/seed/omid-barber-chair/1200/1600">
        <source src="./assets/video/studio-loop.mp4" type="video/mp4">
      </video>
      -->

      <div class="auth__visual-overlay"></div>
      <div class="auth__visual-content" data-reveal>
        <span class="auth__visual-eyebrow">Omid Nik Mohammadi</span>
        <p class="auth__visual-quote">Mastery executed in silence.</p>
      </div>
    </section>

    <section class="auth__panel">
      <div class="auth__panel-inner">

        <header class="auth__header" data-reveal>
          <span class="auth__eyebrow">Client Access</span>
          <h1 class="auth__title">Sign in</h1>
          <p class="auth__subtitle">Book your next appointment and manage your visits.</p>
        </header>

        <div class="auth__tabs" role="tablist" aria-label="Sign in method" data-reveal style="display: none;">
          <button class="auth__tab " type="button" role="tab" aria-selected="true" id="tab-email" data-tab-target="email">Email</button>
          <button class="auth__tab auth__tab--active" type="button" role="tab" aria-selected="false" id="tab-mobile" data-tab-target="mobile">Mobile</button>
        </div>

        <form class="auth__form" id="signInForm" novalidate data-reveal>

          <div class="auth__field" data-field="email" hidden style="display: none;">
            <label class="auth__label" for="signInEmail">Email address</label>
            <input class="auth__input" type="email" id="signInEmail" name="email" autocomplete="email" placeholder="you@example.com" required>
          </div>

          <div class="auth__field" data-field="mobile">
            <label class="auth__label" for="signInMobile">Mobile number</label>
            <input class="auth__input" type="tel" id="signInMobile" name="mobile" autocomplete="tel" placeholder="+1 555 000 0000">
          </div>

          <div class="auth__field">
            <label class="auth__label" for="signInPassword">Password</label>
            <div class="auth__input-group">
              <input class="auth__input" type="password" id="signInPassword" name="password" autocomplete="current-password" placeholder="••••••••" required>
              <button class="auth__visibility-toggle" type="button" data-toggle-password="signInPassword" aria-label="Show password">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6">
                  <path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <p class="auth__error" id="signInError" role="alert" aria-live="polite"></p>

          <div class="auth__field-row">
            <label class="auth__checkbox">
              <input type="checkbox" name="remember">
              <span>Remember me</span>
            </label>
            <!-- <a class="auth__link" href="#">Forgot password?</a> -->
          </div>

          <button class="auth__button auth__button--primary" type="submit">Sign in</button>

        </form>

        <p class="auth__footer-note" data-reveal>New here? <a class="auth__link" href="sign-up.html">Create an account</a></p>

      </div>
    </section>

  </div>
</div>

<script src="./scripts/sign-in-up.js"></script>

</body>
</html>
