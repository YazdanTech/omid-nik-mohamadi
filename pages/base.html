{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}پت گرومینگ{% endblock %}</title>
    
    <!-- Permanent global styles used across ALL pages -->
    <link rel="stylesheet" href="{% static 'styles/style.css' %}">
    <link rel="stylesheet" href="{% static 'styles/nav.css' %}">
    <link rel="stylesheet" href="{% static 'styles/footer.css' %}">
    <link rel="stylesheet" href="{% static 'styles/auth-overlay.css' %}">
    
    <!-- This block allows specific pages to inject their unique stylesheets -->
    {% block styles %}{% endblock %}
</head>
<body>

    <!-- 1. Permanent Shared Navbar -->
    <nav class="main-navbar">
        <!-- Your navigation HTML markup goes here -->
    </nav>

    <!-- 2. Permanent Shared Auth Overlay Pop-up -->
    <div id="auth-modal" class="modal-overlay hidden">
        <!-- Your popup login/signup HTML form goes here -->
    </div>

    <!-- 3. Dynamic Content Injection Point -->
    <main class="content-wrapper">
        {% block content %}{% endblock %}
    </main>

    <!-- 4. Permanent Shared Footer -->
    <footer class="main-footer">
        <!-- Your footer HTML markup goes here -->
    </footer>

    <!-- Permanent global script -->
    <script src="{% static 'script/main.js' %}"></script>
    
    <!-- This block allows specific pages to inject unique scripts -->
    {% block scripts %}{% endblock %}
</body>
</html>
